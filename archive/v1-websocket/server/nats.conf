# AIM NATS Server 配置
# aim-veritas §7 单机部署

port: 4222
http_port: 8222

jetstream {
  store_dir: "/Users/yangzs/.aim/server/data/jetstream"
  max_memory_store: 256MB
  max_file_store: 2GB
}

# 日志
log_file: "/Users/yangzs/.aim/logs/nats-server.log"
log_time: true
debug: false
trace: false

# 连接限制
max_connections: 100
write_deadline: "10s"

# 鉴权（局域网阶段用简单 token，公网后改 JWT）
authorization {
  token: "YOUR_LOCAL_DEV_TOKEN"
  timeout: 2.0
}
